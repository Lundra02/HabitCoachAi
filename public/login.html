<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AI Habit Coach</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding: 20px;
        }
        .auth-form input {
            padding: 12px 15px;
            border-radius: 8px;
            border: 1px solid #dfe6e9;
            background: #f8f9fa;
        }
        .auth-form button {
            width: 100%;
        }
        .auth-link {
            text-align: center;
            margin-top: 15px;
            font-size: 0.9rem;
        }
        .auth-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="glass-container">
    <header>
        <h1>🌿 HabitCoach<span>AI</span></h1>
        <p class="subtitle">Welcome back! Please login.</p>
    </header>

    <main>
        <form id="loginForm" class="auth-form">
            <input type="email" id="email" placeholder="Email" required />
            <input type="password" id="password" placeholder="Password" required />
            <button type="submit" id="authSubmitBtn">Login</button>
        </form>
        <p class="auth-link">Don't have an account? <a href="signup.html">Sign Up</a></p>
    </main>

    <footer>
        <p id="error" class="error-text"></p>
    </footer>
</div>

<script src="script.js"></script>
</body>
</html>
